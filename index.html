<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="XPRIZE Reader">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>XPRIZE Offline Reader</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./reader-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./reader-icon-512.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="library" aria-label="Markdown files">
        <header class="library-header">
          <div>
            <p class="eyebrow">Offline packet</p>
            <h1>XPRIZE Reader</h1>
          </div>
          <span id="statusBadge" class="status-badge">Checking</span>
        </header>

        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="Idea, category, risk...">
        </label>

        <nav id="fileList" class="file-list"></nav>
      </aside>

      <main class="reader">
        <header class="reader-toolbar">
          <button id="menuButton" class="icon-button" type="button" aria-label="Open file list">
            <span></span><span></span><span></span>
          </button>
          <div>
            <p id="sectionLabel" class="eyebrow">Ready</p>
            <h2 id="docTitle">Choose a file</h2>
          </div>
        </header>

        <article id="content" class="content">
          <p class="empty-state">Open this site once while online. After the cache finishes, add it to your iPhone Home Screen and the markdown files will be available offline.</p>
        </article>
      </main>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
